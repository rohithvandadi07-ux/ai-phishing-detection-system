<!DOCTYPE html>
<html>

<head>

    <title>Blocked - AI Phishing Shield</title>

    <style>

        body {

            background-color: #0d1117;
            color: white;

            font-family: Arial, sans-serif;

            display: flex;

            justify-content: center;
            align-items: center;

            height: 100vh;

            margin: 0;
        }

        .container {

            background: #161b22;

            border: 2px solid red;

            border-radius: 15px;

            padding: 40px;

            width: 700px;

            box-shadow: 0 0 25px red;
        }

        h1 {

            color: red;

            font-size: 42px;

            margin-bottom: 10px;
        }

        .danger {

            font-size: 22px;

            color: orange;

            margin-bottom: 25px;
        }

        .info {

            margin-top: 20px;

            padding: 15px;

            background: #0d1117;

            border-radius: 10px;

            word-wrap: break-word;
        }

        .label {

            color: cyan;

            font-weight: bold;
        }

        .score {

            color: red;

            font-size: 28px;

            font-weight: bold;
        }

        button {

            margin-top: 30px;

            background: red;

            border: none;

            padding: 15px 25px;

            color: white;

            font-size: 18px;

            border-radius: 10px;

            cursor: pointer;
        }

        button:hover {

            background: darkred;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>⚠ WEBSITE BLOCKED</h1>

        <div class="danger">

            AI Phishing Shield detected this website as dangerous.

        </div>

        <!-- URL INFO -->

        <div class="info">

            <p>

                <span class="label">Blocked URL:</span>

            </p>

            <p id="blocked-url"></p>

        </div>

        <!-- RISK INFO -->

        <div class="info">

            <p>

                <span class="label">Risk Level:</span>

                <span id="risk-level"></span>

            </p>

            <p>

                <span class="label">Risk Score:</span>

                <span class="score" id="risk-score"></span>

            </p>

            <p>

                <span class="label">Confidence:</span>

                <span id="confidence"></span>

            </p>

        </div>

        <!-- BUTTON -->

        <button id="back-button">

            Go Back To Safety

        </button>

    </div>

    <script src="blocked.js"></script>

</body>

</html>
