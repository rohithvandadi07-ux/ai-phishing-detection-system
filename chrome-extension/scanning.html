<!DOCTYPE html>
<html>

<head>

    <title>AI Threat Analysis</title>

    <link
        rel="stylesheet"
        href="scanning.css"
    >

</head>

<body>

<div class="container">

    <div class="shield">
        🛡️
    </div>

    <h1>
        AI Phishing Shield
    </h1>

    <h2>
        Analyzing Website...
    </h2>

    <div
        class="url-box"
        id="urlText"
    >
        Initializing AI Engine...
    </div>

    <div class="progress-section">

        <div class="progress-bar">

            <div
                class="progress-fill"
                id="progressFill"
            >
            </div>

        </div>

        <div
            class="progress-text"
            id="progressText"
        >
            Starting Analysis...
        </div>

    </div>

    <div class="checks">

        <div
            class="check-item"
            id="step1"
        >
            ⏳ URL Structure Analysis
        </div>

        <div
            class="check-item"
            id="step2"
        >
            ⏳ Domain Reputation Check
        </div>

        <div
            class="check-item"
            id="step3"
        >
            ⏳ AI Model Inspection
        </div>

        <div
            class="check-item"
            id="step4"
        >
            ⏳ Threat Classification
        </div>

    </div>

</div>

<script src="scanning.js"></script>

</body>

</html>
