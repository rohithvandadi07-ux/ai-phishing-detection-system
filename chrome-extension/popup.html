<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Phishing Detector</title>

    <style>

        body {
            width: 360px;
            padding: 15px;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
        }

        .url {
            word-break: break-all;
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .score-box {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
        }

        .score {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            width: 45%;
            text-align: center;
        }

        .score span {
            display: block;
            font-size: 12px;
            color: #cbd5e1;
        }

        .score strong {
            font-size: 18px;
        }

        .reasons {
            margin-top: 15px;
        }

        .reasons ul {
            padding-left: 18px;
        }

        .reasons li {
            margin-bottom: 6px;
            color: #fca5a5;
        }

    </style>
</head>

<body>

    <div class="card">

        <h2>🛡️ AI Phishing Detector</h2>

        <div class="url" id="url">
            Checking URL...
        </div>

        <div id="result">
            Loading...
        </div>

    </div>

    <script src="popup.js"></script>

</body>
</html>
